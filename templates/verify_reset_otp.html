<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify OTP - Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% include 'partials/app_design.html' %}
  <style>
    .card {
      background: rgba(255, 255, 255, 0.9);
      padding: 30px 25px;
      border-radius: 28px;
      box-shadow: var(--app-shadow-lift);
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 1px solid var(--app-line);
    }
    h2 {
      margin-bottom: 20px;
      font-size: 22px;
      color: #1f2937;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: #374151;
      text-align: left;
    }
    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #d1d5db;
      font-size: 16px;
      margin-bottom: 20px;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      background: rgba(255,255,255,0.9);
    }
    input[type="text"]:focus {
      border-color: #10b981;
      box-shadow: 0 0 0 4px rgba(16,185,129,0.1);
    }
    button {
      width: 100%;
      padding: 14px 16px;
      background: linear-gradient(135deg, #147d4f, #1b9c62);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      box-shadow: 0 16px 32px rgba(20, 125, 79, 0.24);
    }
    button:hover {
      background: #059669;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  {% set active_page = 'none' %}
  {% include 'partials/app_nav_public.html' %}
  <main style="min-height:calc(100vh - 80px);display:flex;align-items:center;justify-content:center;padding:24px 16px;">
    <div class="card app-surface">
      <h2>Verify OTP</h2>
      <form method="POST">
        <label for="otp">Enter OTP</label>
        <input id="otp" type="text" name="otp" placeholder="Enter 6-digit OTP" required maxlength="6" pattern="\d{6}">
        <button type="submit">Verify</button>
      </form>
    </div>
  </main>
  {% include 'partials/app_chat_fab.html' %}
  {% include 'partials/app_nav_script.html' %}
</body>
</html>
